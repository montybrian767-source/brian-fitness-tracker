<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="10" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="900" height="600" rx="36" fill="url(#bg)"/>
  <rect x="42" y="42" width="816" height="516" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <text x="74" y="98" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#111827">Seated Leg Curl Machine</text>
  <text x="74" y="134" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#4b5563">Target: Hamstrings</text>

  <!-- machine frame -->
  <rect x="500" y="165" width="230" height="265" rx="18" fill="#e5e7eb" stroke="#111827" stroke-width="6"/>
  <rect x="530" y="200" width="80" height="135" rx="14" fill="#cbd5e1" stroke="#111827" stroke-width="5"/>
  <line x1="615" y1="185" x2="615" y2="470" stroke="#111827" stroke-width="6"/>
  <circle cx="615" cy="185" r="18" fill="#111827"/>
  <line x1="615" y1="185" x2="470" y2="245" stroke="#111827" stroke-width="7"/>
  <line x1="615" y1="185" x2="760" y2="245" stroke="#111827" stroke-width="7"/>
  <circle cx="470" cy="245" r="14" fill="#111827"/>
  <circle cx="760" cy="245" r="14" fill="#111827"/>

  <!-- person -->
  <circle cx="330" cy="205" r="38" fill="#f1c27d" stroke="#111827" stroke-width="5"/>
  <line x1="330" y1="245" x2="330" y2="350" stroke="#111827" stroke-width="12" stroke-linecap="round"/>
  <line x1="330" y1="275" x2="460" y2="245" stroke="#ef4444" stroke-width="14" stroke-linecap="round"/>
  <line x1="330" y1="275" x2="240" y2="245" stroke="#111827" stroke-width="12" stroke-linecap="round"/>
  <line x1="330" y1="350" x2="265" y2="450" stroke="#111827" stroke-width="13" stroke-linecap="round"/>
  <line x1="330" y1="350" x2="405" y2="450" stroke="#111827" stroke-width="13" stroke-linecap="round"/>
  <rect x="245" y="450" width="55" height="18" rx="9" fill="#111827"/>
  <rect x="388" y="450" width="55" height="18" rx="9" fill="#111827"/>

  <!-- movement arrow -->
  <path d="M195 165 C255 120, 365 120, 425 165" fill="none" stroke="#22c55e" stroke-width="9" stroke-linecap="round"/>
  <polygon points="430,165 400,150 406,184" fill="#22c55e"/>
  <text x="74" y="505" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111827">How to use:</text>
  <text x="74" y="536" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#374151">Set the seat, control the motion, pause, and return slowly.</text>
</svg>